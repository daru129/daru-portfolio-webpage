  <style>
    /* Layout: make body/site-wrap full-height so footer can sit at bottom */
    html, body { height:100%; }
    body{ display:flex; flex-direction:column; min-height:100vh; padding-top:6px; }
    .site-wrap{ flex:1; display:flex; flex-direction:column; }
    main{ flex:1; }

    /* Channel cards: keep modest, plenty of spacing above videos */
    #channels { margin: 96px 0 64px; }
    .section-head-left{display:flex;align-items:center;gap:12px}
    .head-avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;flex:0 0 40px}
    .channels-row { position:relative; }
    .channels-grid { display:flex; flex-wrap:nowrap; gap:20px; justify-content:flex-start; overflow-x:auto; scroll-behavior:smooth; padding:8px 36px; scrollbar-width:none; -ms-overflow-style:none; }
    .channels-grid::-webkit-scrollbar{ display:none; height:0; }
    .channels-prev, .channels-next{
      position:absolute; top:50%; transform:translateY(-50%); width:36px; height:36px; border-radius:18px; border:0; background:rgba(255,255,255,0.9); box-shadow:0 4px 10px rgba(0,0,0,0.08); cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:6;
    }
    .channels-prev{ left:6px }
    .channels-next{ right:6px }
    .channels-prev[disabled], .channels-next[disabled]{ opacity:0.42; cursor:default }
    .channel-card { box-sizing:border-box; width:240px; height:280px; background: #ffffff; border-radius:10px; box-shadow:0 6px 18px rgba(15,15,15,0.06); padding:16px; display:flex; flex-direction:column; align-items:center; text-align:center; justify-content:space-between; overflow:hidden; flex:0 0 auto }
    .channel-avatar img{ width:96px; height:96px; border-radius:50%; object-fit:cover; flex:0 0 auto }
    .channel-name{ margin-top:10px; font-weight:700; font-size:1.15rem; line-height:1.1; }
    .channel-desc{
      margin-top:8px;
      color:#666;
      font-size:0.95rem;
      line-height:1.2;
      display:-webkit-box;
      -webkit-box-orient:vertical;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:normal;
      max-width:100%;
      min-height:2.6em; /* ensure two lines fully visible */
      padding-bottom:2px; /* small breathing room to avoid clipping */
    }
    .channel-meta{ margin-top:8px; font-size:0.9rem; color:#444 }
    .channel-link{ margin-top:12px; display:inline-block; padding:6px 10px; border-radius:8px; border:1px solid #e6e6e6; color:inherit; text-decoration:none; background:#fafafa }
    /* Header styling lives in external stylesheet; header height is applied by script */
    .brand{ display:flex; align-items:center; gap:14px }
    .logo img{ width:48px; height:48px; border-radius:8px; object-fit:cover; display:block; box-shadow:none; background:transparent; padding:0 }
    .title h1{ margin:0; font-size:1.15rem; font-weight:800 }
    .subtitle{ font-size:0.95rem; color:#666; margin-top:4px }
    .actions{ display:flex; align-items:center }
    .btn.contact{ background:linear-gradient(180deg,#8b5cf6,#7c3aed); color:#fff; padding:10px 16px; border-radius:12px; box-shadow:0 10px 30px rgba(99,102,241,0.18); text-decoration:none; border:0 }
    .btn.contact:focus{ outline:2px solid rgba(124,58,237,0.18); outline-offset:2px }

    /* Footer */
    .site-footer{ margin-top:64px; border-top:1px solid rgba(0,0,0,0.06); padding:40px 22px 48px 22px; background:#fbfbfc; box-shadow:0 -6px 20px rgba(12,12,12,0.02); }
    .footer-inner{ max-width:1100px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; gap:12px }
    .footer-brand img{ width:40px; height:40px; border-radius:8px }
    .footer-info{ display:flex; flex-direction:column; gap:4px }
    .footer-info a{ color:inherit; text-decoration:none }
    .footer-right{ color:#888; font-size:0.9rem }
    /* extra spacing between videos and footer */
    #videos{ margin-bottom:56px }

  <script>
    // compute header height and set CSS var + site-wrap padding so content sits below fixed header
    function updateHeaderHeight(){
      try{
        const header = document.querySelector('.header');
        const siteWrap = document.querySelector('.site-wrap');
        if(!header || !siteWrap) return;
        const h = header.offsetHeight;
        document.documentElement.style.setProperty('--header-height', h + 'px');
        siteWrap.style.paddingTop = (h + 6) + 'px';
      }catch(e){}
    }
    // compute dark-band height (distance from page top to hero bottom) and store in CSS var --hero-cover
    function updateHeroCover(){
      try{
        const hero = document.getElementById('hero');
        if(!hero) return;
        const rect = hero.getBoundingClientRect();
        // distance from document top to hero bottom
        const docHeroBottom = Math.round(window.scrollY + rect.top + rect.height);
        document.documentElement.style.setProperty('--hero-cover', docHeroBottom + 'px');
      }catch(e){}
    }
    window.addEventListener('DOMContentLoaded', ()=>{ updateHeaderHeight(); });
    window.addEventListener('DOMContentLoaded', ()=>{ updateHeroCover(); });
    window.addEventListener('resize', ()=>{ requestAnimationFrame(()=>{ updateHeaderHeight(); updateHeroCover(); }); });
    // recompute hero cover after full load as images may change layout
    window.addEventListener('load', ()=>{ setTimeout(updateHeroCover, 80); });

    function extractYouTubeId(url){
      if(!url) return null;
      const m = url.match(/(?:v=|youtu\.be\/)([A-Za-z0-9_-]{4,})/);
      return m ? m[1] : null;
    }

    function thumbUrl(id){
      return id ? `https://img.youtube.com/vi/${id}/hqdefault.jpg` : '';
    }

    function fmtDate(ts){
      if(!ts) return '';
      const d = new Date(ts*1000);
      return d.toLocaleDateString();
    }

    async function loadVideos(){
      const target = document.getElementById('videos');
      try{
        const res = await fetch('./videos.json');
        if(!res.ok){
          target.innerHTML = '<div class="empty">비어있거나 videos.json을 찾을 수 없습니다.</div>';
          return;
        }
        const data = await res.json();
        if(!Array.isArray(data) || data.length === 0){
          target.innerHTML = '<div class="empty">아직 업로드된 포트폴리오가 없습니다.</div>';
          return;
        }

        target.innerHTML = '';

        // Helper: detect playlist URLs and extract playlist id (list= or /playlist?list=)
        function getPlaylistId(url){
          if(!url) return null;
          try{
            const u = new URL(url);
            if(u.searchParams && u.searchParams.get('list')) return u.searchParams.get('list');
            const m = url.match(/(?:list=|playlist\?list=)([A-Za-z0-9_-]+)/);
            return m ? m[1] : null;
          }catch(e){
            const m = url.match(/(?:list=|playlist\?list=)([A-Za-z0-9_-]+)/);
            return m ? m[1] : null;
          }
        }

        // Fetch playlist entries from YouTube's RSS feed and return array of items { url, title, uploader_name }
        async function fetchPlaylistItems(listId){
          if(!listId) return [];
          const feedUrl = `https://www.youtube.com/feeds/videos.xml?playlist_id=${encodeURIComponent(listId)}`;
          try{
            const r = await fetch(feedUrl);
            if(!r.ok) return [];
            const txt = await r.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(txt, 'application/xml');
            const entries = Array.from(doc.querySelectorAll('entry'));
            const authorEl = doc.querySelector('author > name');
            const uploaderName = authorEl ? authorEl.textContent : '';
            return entries.map(e => {
              const vid = e.querySelector('yt\\:videoId, videoId');
              const titleEl = e.querySelector('title');
              const id = vid ? vid.textContent : null;
              return {
                url: id ? `https://www.youtube.com/watch?v=${id}` : (e.querySelector('link') ? e.querySelector('link').getAttribute('href') : ''),
                title: titleEl ? titleEl.textContent : '',
                uploader_name: uploaderName || ''
              };
            });
          }catch(e){
            console.warn('playlist fetch failed', e);
            return [];
          }
        }

        // Expand items: if an entry is a playlist link, replace it with its videos (fetched async)
        const expandedItems = [];
        const playlistPromises = [];
        data.forEach(item => {
          const listId = getPlaylistId(item.url || '');
          if(listId){
            // push a promise that will append resolved entries preserving some parent metadata
            const p = fetchPlaylistItems(listId).then(entries => {
              if(entries && entries.length){
                entries.forEach(en => {
                  // carry over added_by/added_at if present on parent item
                  expandedItems.push(Object.assign({}, en, { added_by: item.added_by, added_at: item.added_at }));
                });
              }
            }).catch(()=>{});
            playlistPromises.push(p);
          } else {
            expandedItems.push(item);
          }
        });

        // wait for all playlist fetches to finish
        await Promise.all(playlistPromises);

        // Group videos by uploader_id (fall back to uploader_name)
        const groups = {};
        expandedItems.forEach(item => {
          const key = item.uploader_id || item.uploader_name || 'unknown';
          if(!groups[key]) groups[key] = { name: item.uploader_name || item.uploader_id || 'Unknown', items: [] };
          groups[key].items.push(item);
        });

        // try to load channel profiles so we can show avatars next to section headers
        const channelProfiles = {};
        try{
          const resp = await fetch('./channel_profiles.json');
          if(resp.ok){
            const ch = await resp.json();
            if(Array.isArray(ch)){
              ch.forEach(p=>{
                if(p.uploader_id) channelProfiles[p.uploader_id] = p;
                if(p.uploader_name) channelProfiles[p.uploader_name] = p;
              });
            }
          }
        }catch(e){ /* ignore */ }

        // Render each group as a section with header and grid of cards
        Object.keys(groups).forEach(key => {
          const grp = groups[key];
          const section = document.createElement('section');
          section.className = 'uploader-section';

          const head = document.createElement('div'); head.className = 'section-head';
          const h = document.createElement('h2'); h.textContent = grp.name;
          // left side: avatar + title
          const left = document.createElement('div'); left.className = 'section-head-left';
          // try to find a matching profile by id or name
          const prof = channelProfiles[key] || channelProfiles[grp.name] || null;
          if(prof){
            const img = document.createElement('img'); img.className = 'head-avatar'; img.alt = prof.uploader_name || prof.uploader_id || '';
            img.src = prof.avatar || prof.uploader_avatar || './assets/logo_light.png';
            left.appendChild(img);
          }
          left.appendChild(h);
          head.appendChild(left);

          const grid = document.createElement('div'); grid.className = 'grid';

          grp.items.forEach(item => {
            const id = extractYouTubeId(item.url||'');
            const card = document.createElement('article'); card.className = 'card';

            const thumb = document.createElement('div'); thumb.className='thumb';
            if(id){
              const img = document.createElement('img'); img.src = thumbUrl(id); img.alt = item.title || 'video thumbnail';
              thumb.appendChild(img);
              thumb.addEventListener('click', ()=>openModal(id));
            } else {
              const a = document.createElement('a'); a.href = item.url||'#'; a.textContent = item.url||'link'; a.target='_blank'; thumb.appendChild(a);
            }

            const meta = document.createElement('div'); meta.className='meta';
            const t = document.createElement('div'); t.className='t'; t.textContent = item.title || (id ? `Video ${id}` : 'Link');
            meta.appendChild(t);

            card.appendChild(thumb); card.appendChild(meta);
            grid.appendChild(card);
          });

          // after building grid, decide whether to collapse to 2 rows and add a section-level more button
          const gapPx = parseInt(getComputedStyle(grid).gap || 18, 10) || 18;
          // append section children first so measurements work
          section.appendChild(head);
          section.appendChild(grid);
          target.appendChild(section);

          // measure columns and rows
          requestAnimationFrame(()=>{ try {
            const colsStyle = getComputedStyle(grid).gridTemplateColumns || '';
            const cols = colsStyle && colsStyle !== 'none' ? colsStyle.split(' ').length : 1;
            const itemCount = grp.items.length;
            if(itemCount <= 6) return; // show up to 6 items fully

            const firstCard = grid.querySelector('.card');
            const cardH = firstCard ? firstCard.offsetHeight : 220;
            // show 6 full items (calculate rows needed by columns), plus a hint (~33%) of the next row
            const fullItems = 6;
            const hintPortion = 0.12; // fraction of card height to reveal for hint (keep small)
            const fullRows = Math.ceil(fullItems / Math.max(1, cols));
            let collapsedMax = (cardH * fullRows) + (gapPx * Math.max(0, fullRows - 1)) + Math.round(cardH * hintPortion);
            grid.classList.add('collapsed');
            grid.style.maxHeight = collapsedMax + 'px';

            // fade overlay and section-level more button
            const fadeEl = document.createElement('div'); fadeEl.className = 'grid-fade';
            const moreSec = document.createElement('button'); moreSec.className = 'more-btn-section'; moreSec.type='button';
            moreSec.innerHTML = '<span class="more-icon">' +
              '<svg viewBox="0 0 24 24" width="14" height="14" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">' +
                '<path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>' +
              '</svg>' +
            '</span><span class="more-text">더보기</span>';

            // append fade into the grid so it moves with grid's height
            grid.appendChild(fadeEl);
            // place more button on the section (absolute relative to section)
            section.appendChild(moreSec);

            // shared variables that will be recomputed on resize / image load
            let fadeHeight = Math.max(28, Math.round(cardH * hintPortion));

            // ensure grid will clip and can contain an absolutely positioned fade inside it
            grid.classList.add('collapsed');
            grid.style.position = grid.style.position || 'relative';
            grid.style.overflow = 'hidden';
            grid.style.maxHeight = collapsedMax + 'px';

            // style fade to stick to grid bottom
            fadeEl.style.position = 'absolute';
            fadeEl.style.left = '0';
            fadeEl.style.right = '0';
            fadeEl.style.bottom = '0';
            fadeEl.style.height = fadeHeight + 'px';
            fadeEl.style.pointerEvents = 'none';
            fadeEl.style.opacity = '1';
            fadeEl.style.transition = 'opacity 420ms cubic-bezier(0.2,0.9,0.2,1)';

            // position the more button centered horizontally; vertical pos set by reposition()
            moreSec.style.position = 'absolute';
            moreSec.style.left = '50%';
            moreSec.style.transform = 'translateX(-50%)';
            moreSec.style.zIndex = '4';

            // helper to recompute positions when layout changes
            const reposition = ()=>{
              const colsStyle2 = getComputedStyle(grid).gridTemplateColumns || '';
              const cols2 = colsStyle2 && colsStyle2 !== 'none' ? colsStyle2.split(' ').length : 1;
              const firstCard2 = grid.querySelector('.card');
              const cardH2 = firstCard2 ? firstCard2.offsetHeight : cardH;
              fadeHeight = Math.max(28, Math.round(cardH2 * hintPortion));
              const fullRows2 = Math.ceil(fullItems / Math.max(1, cols2));
              collapsedMax = (cardH2 * fullRows2) + (gapPx * Math.max(0, fullRows2 - 1)) + Math.round(cardH2 * hintPortion);
              grid.style.maxHeight = collapsedMax + 'px';
              fadeEl.style.height = fadeHeight + 'px';
              // compute more button vertical position relative to section
              const gridRect = grid.getBoundingClientRect();
              const sectionRect = section.getBoundingClientRect();
              const relTop = gridRect.top - sectionRect.top;
              const btnH2 = moreSec.offsetHeight || 36;
              const btnCenter2 = relTop + collapsedMax - Math.round(fadeHeight/2);
              const overlapOffset2 = Math.round(Math.max(12, btnH2 * 0.25));
              const overlayTop2 = (btnCenter2 - Math.round(btnH2/2) + overlapOffset2);
              moreSec.style.top = overlayTop2 + 'px';
            };

            // initial reposition after layout
            setTimeout(()=>{ reposition(); }, 0);
            // recompute when window resizes or images inside grid load
            window.addEventListener('resize', ()=>{ requestAnimationFrame(reposition); });
            grid.querySelectorAll('img').forEach(img=>{ img.addEventListener('load', ()=>{ requestAnimationFrame(reposition); }); });

            // enable smooth top transitions (duration computed from distance so perceived speed is constant)
            const animEasing = 'cubic-bezier(0.2,0.9,0.2,1)';
            const computeAnimMs = (distance)=>{
              // distance in px -> convert to ms so speed feels consistent regardless of distance
              // faster: ~1.6 px/ms (i.e. 1600 px/s). clamp to sensible min/max.
              const ms = Math.round(Math.min(800, Math.max(280, distance / 1.6)));
              return ms;
            };
            // set a sensible default so initial styles exist
            moreSec.style.transition = `top 420ms ${animEasing}, opacity 180ms ease`;

            moreSec.addEventListener('click', ()=>{
                const txtEl = moreSec.querySelector('.more-text');
                const iconEl = moreSec.querySelector('.more-icon');
                // recompute layout values at click time to handle images/responsive changes
                const currentGridTop = grid.offsetTop || 0;
                const btnH2 = moreSec.offsetHeight || 36;
                // measure current full height (may be in-transition)
                const belowTop2 = currentGridTop + grid.scrollHeight + 12;

                if(grid.classList.contains('collapsed')){
                  // expand: animate grid to full height and move button down and fade out together
                  grid.classList.remove('collapsed');
                  // ensure maxHeight starts at collapsedMax then animate to scrollHeight
                  grid.style.maxHeight = collapsedMax + 'px';
                  requestAnimationFrame(()=>{
                    // compute target positions and durations based on movement distance
                    const sectionRectX = section.getBoundingClientRect();
                    const cards = Array.from(grid.querySelectorAll('.card'));
                    const lastCard = cards.length ? cards[cards.length-1] : null;
                    const currentTop = parseFloat(getComputedStyle(moreSec).top) || moreSec.offsetTop || 0;
                    const targetTop = (lastCard ? Math.round(lastCard.getBoundingClientRect().bottom - sectionRectX.top + 12) : Math.round(grid.getBoundingClientRect().bottom - sectionRectX.top + 12));
                    const moveDist = Math.abs(targetTop - currentTop);
                    const gridDelta = Math.abs(grid.scrollHeight - collapsedMax);
                    const animMs = computeAnimMs(Math.max(moveDist, gridDelta));
                    // apply transitions matching computed duration
                    grid.style.transition = `max-height ${animMs}ms ${animEasing}`;
                    moreSec.style.transition = `top ${animMs}ms ${animEasing}, opacity 180ms ease`;
                    fadeEl.style.transition = `opacity ${Math.min(240, Math.round(animMs/2))}ms ease`;

                    grid.style.maxHeight = grid.scrollHeight + 'px';
                    // move button down to just below the last card (relative to section)
                    moreSec.style.top = targetTop + 'px';
                    fadeEl.style.opacity = '0';
                  });
                  if(txtEl) txtEl.textContent = '접기';
                  if(iconEl) iconEl.classList.add('rotated');
                }else{
                  // collapse: move button up and shrink grid at the same time
                  // collapse: compute overlay top and return grid to collapsedMax
                  const gridRect2 = grid.getBoundingClientRect();
                  const sectionRect2 = section.getBoundingClientRect();
                  const relTop2 = gridRect2.top - sectionRect2.top;
                  const btnCenter3 = relTop2 + collapsedMax - Math.round(fadeHeight/2);
                  const overlapOffset3 = Math.round(Math.max(12, btnH2 * 0.25));
                  const overlayTop3 = (btnCenter3 - Math.round(btnH2/2) + overlapOffset3);
                  // compute durations based on movement distance so speed feels consistent
                  const currentTopC = parseFloat(getComputedStyle(moreSec).top) || moreSec.offsetTop || 0;
                  const moveDistC = Math.abs(overlayTop3 - currentTopC);
                  const gridDeltaC = Math.abs(grid.scrollHeight - collapsedMax);
                  const animMsC = computeAnimMs(Math.max(moveDistC, gridDeltaC));
                  grid.style.transition = `max-height ${animMsC}ms ${animEasing}`;
                  moreSec.style.transition = `top ${animMsC}ms ${animEasing}, opacity 180ms ease`;
                  fadeEl.style.transition = `opacity ${Math.min(240, Math.round(animMsC/2))}ms ease`;
                  moreSec.style.top = overlayTop3 + 'px';
                  // ensure fade overlay is visible again and grid shrinks
                  fadeEl.style.opacity = '1';
                  grid.style.maxHeight = collapsedMax + 'px';
                  if(iconEl) iconEl.classList.remove('rotated');
                  if(txtEl) txtEl.textContent = '더보기';
                  // when button finished moving up, finalize collapsed state
                  const onEnd = function onEnd(e){
                    if(e.propertyName === 'top'){
                      moreSec.removeEventListener('transitionend', onEnd);
                      grid.classList.add('collapsed');
                      section.scrollIntoView({behavior:'smooth', block:'start'});
                    }
                  };
                  moreSec.addEventListener('transitionend', onEnd);
                }
              });
            }catch(e){ console.error('section render error', e); }
            });
          });
      }catch(e){
        target.innerHTML = '<div class="empty">로딩 중 오류가 발생했습니다.</div>';
        console.error(e);
      }
    }

    async function loadChannels(){
      const container = document.querySelector('#channels .channels-grid');
      if(!container) return;
      try{
        const res = await fetch('./channel_profiles.json');
        if(!res.ok){
          container.innerHTML = '<div class="empty">채널 프로필을 찾을 수 없습니다.</div>';
          return;
        }
        const data = await res.json();
        if(!Array.isArray(data) || data.length === 0){
          container.innerHTML = '<div class="empty">등록된 채널이 없습니다.</div>';
          return;
        }
        container.innerHTML = '';
        data.forEach(p=>{
          const card = document.createElement('article'); card.className='channel-card';
          const avatarWrap = document.createElement('div'); avatarWrap.className='channel-avatar';
          const img = document.createElement('img'); img.alt = p.uploader_name || p.uploader_id || 'channel';
          img.src = p.avatar || './assets/logo_light.png';
          avatarWrap.appendChild(img);
          const name = document.createElement('div'); name.className='channel-name'; name.textContent = p.uploader_name || p.uploader_id || 'Unknown';
          const desc = document.createElement('div'); desc.className='channel-desc'; desc.textContent = p.description || '';
          const meta = document.createElement('div'); meta.className='channel-meta'; meta.textContent = p.subs ? `${p.subs} subscribers` : '';
          const link = document.createElement('a'); link.className='channel-link'; link.href = p.url || '#'; link.target='_blank'; link.rel='noopener noreferrer'; link.textContent='채널 보기';
          // prevent inner link click from bubbling to card (which also opens)
          link.addEventListener('click', (e)=>{ e.stopPropagation(); });

          // make entire card clickable and keyboard-accessible
          if(p.url){
            card.tabIndex = 0;
            card.setAttribute('role','link');
            card.setAttribute('aria-label', `${p.uploader_name || p.uploader_id || 'channel'} 채널 열기`);
            card.style.cursor = 'pointer';
            card.addEventListener('click', ()=>{ window.open(p.url, '_blank', 'noopener'); });
            card.addEventListener('keydown', (e)=>{ if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); window.open(p.url, '_blank', 'noopener'); } });
          }
          card.appendChild(avatarWrap);
          card.appendChild(name);
          card.appendChild(desc);
          card.appendChild(meta);
          card.appendChild(link);
          container.appendChild(card);
        });
        // after render, setup scroller buttons
        setupChannelScroller();
      }catch(e){ console.error('loadChannels error', e); container.innerHTML = '<div class="empty">채널 로딩 중 오류가 발생했습니다.</div>'; }
    }

    function setupChannelScroller(){
      const row = document.querySelector('.channels-row');
      if(!row) return;
      const grid = row.querySelector('.channels-grid');
      const prev = row.querySelector('.channels-prev');
      const next = row.querySelector('.channels-next');

      const update = ()=>{
        if(!grid) return;
        const hasOverflow = grid.scrollWidth > grid.clientWidth + 4;
        if(hasOverflow){ prev.style.display='flex'; next.style.display='flex'; }
        else { prev.style.display='none'; next.style.display='none'; }
        prev.disabled = grid.scrollLeft <= 0;
        next.disabled = grid.scrollLeft + grid.clientWidth >= grid.scrollWidth - 1;
      };

      if(prev && next && grid){
        // initial state
        update();
        // scroll action
        next.onclick = ()=>{ grid.scrollBy({ left: Math.round(grid.clientWidth * 0.7), behavior:'smooth' }); };
        prev.onclick = ()=>{ grid.scrollBy({ left: -Math.round(grid.clientWidth * 0.7), behavior:'smooth' }); };
        // show/hide on resize and scroll
        grid.addEventListener('scroll', update);
        window.addEventListener('resize', ()=>{ setTimeout(update,120); });
      }
    }

    function openModal(id){
      const modal = document.getElementById('modal');
      const player = document.getElementById('player');
      player.src = `https://www.youtube.com/embed/${id}?autoplay=1&rel=0`;
      modal.classList.add('open');
    }
    function closeModal(){
      const modal = document.getElementById('modal');
      const player = document.getElementById('player');
      player.src = '';
      modal.classList.remove('open');
    }
    document.getElementById('modal').addEventListener('click',(e)=>{ if(e.target.id==='modal') closeModal(); });
    window.addEventListener('DOMContentLoaded', ()=>{ loadChannels(); loadVideos(); });

    // Contact modal behavior
    const contactBtn = document.querySelector('.btn.contact');
    const contactModal = document.getElementById('contact-modal');
    const contactClose = contactModal ? contactModal.querySelector('.contact-close') : null;
    function openContact(){
      if(!contactModal) return;
      contactModal.classList.add('open');
      contactModal.setAttribute('aria-hidden','false');
    }
    function closeContact(){
      if(!contactModal) return;
      contactModal.classList.remove('open');
      contactModal.setAttribute('aria-hidden','true');
    }
    if(contactBtn){
      contactBtn.addEventListener('click', (e)=>{ e.preventDefault(); openContact(); });
    }
    if(contactClose){ contactClose.addEventListener('click', closeContact); }
    if(contactModal){ contactModal.addEventListener('click', (e)=>{ if(e.target===contactModal) closeContact(); }); window.addEventListener('keydown',(e)=>{ if(e.key==='Escape') closeContact(); }); }

    /* Hero slider: populate from assets/banner/manifest.json or probe numbered files, then init controls */
    (async function(){
      const slider = document.getElementById('hero');
      if(!slider) return;
      const slidesWrap = slider.querySelector('.hero-slides');
      const dotsWrap = slider.querySelector('.hero-dots');
      // create single progress gauge (replace dots) and a small counter
      let progressWrap = slider.querySelector('.hero-progress');
      if(!progressWrap){
        progressWrap = document.createElement('div');
        progressWrap.className = 'hero-progress';
        progressWrap.innerHTML = '<div class="hero-progress-bar"><div class="hero-progress-fill" aria-hidden="true"></div></div>';
        slider.appendChild(progressWrap);
      }
      const progressFill = progressWrap.querySelector('.hero-progress-fill');
      // small top-left counter
      let counter = slider.querySelector('.hero-counter');
      if(!counter){
        counter = document.createElement('div');
        counter.className = 'hero-counter';
        counter.setAttribute('aria-hidden','false');
        slider.appendChild(counter);
      }
      const prev = slider.querySelector('.hero-prev');
      const next = slider.querySelector('.hero-next');
      const basePath = './assets/banner/';
      const PROGRESS_EASE = 'cubic-bezier(0.4,0,0.2,1)';
      // Force JS animations for captions to avoid OS/browser reduced-motion suppressing CSS keyframes
      const FORCE_JS_CAPTION_ANIM = true;

      async function fetchManifest(){
        try{
          const res = await fetch(basePath + 'manifest.json');
          if(res.ok){
            const list = await res.json();
            if(Array.isArray(list) && list.length){
              // support both string items and object items {file,title,subtitle}
              return list.map(item => {
                if(typeof item === 'string') return { file: basePath + item, title: '', subtitle: '' };
                if(item && typeof item === 'object') return { file: basePath + (item.file || ''), title: item.title || '', subtitle: item.subtitle || '' };
                return null;
              }).filter(Boolean);
            }
          }
        }catch(e){ }
        // fallback: probe numbered files
        const found = [];
        const exts = ['jpg','png','jpeg','webp'];
        for(let i=1;i<=20;i++){
          let any=false;
          for(const ext of exts){
            const p = `${basePath}banner${i}.${ext}`;
            try{
              const r = await fetch(p, { method:'HEAD' });
              if(r.ok){ found.push({ file: p, title: '', subtitle: '' }); any=true; break; }
            }catch(e){}
          }
        }
        return found;
      }

      const images = await fetchManifest();
      if(!images || images.length === 0){ slider.style.display='none'; return; }

      slidesWrap.innerHTML = '';
      // we don't use per-slide dots anymore; show a single progress gauge
      const captions = [];
      // create feather and caption elements (bottom-left)
      let feather = slider.querySelector('.hero-feather');
      if(!feather){ feather = document.createElement('div'); feather.className = 'hero-feather'; slider.appendChild(feather); }
      let captionEl = slider.querySelector('.hero-caption');
      if(!captionEl){
        captionEl = document.createElement('div'); captionEl.className = 'hero-caption';
        captionEl.innerHTML = '<h4 class="caption-title"></h4><div class="caption-sub"></div>';
        slider.appendChild(captionEl);
      }
      const captionTitle = captionEl.querySelector('.caption-title');
      const captionSub = captionEl.querySelector('.caption-sub');

      images.forEach((item,i)=>{
        const src = (typeof item === 'string') ? item : (item.file || '');
        const s = document.createElement('div'); s.className = 'hero-slide' + (i===0 ? ' active' : ''); s.style.backgroundImage = `url('${src}')`;
        slidesWrap.appendChild(s);
        // store title/subtitle for this slide
        const t = (typeof item === 'string') ? '' : (item.title || '');
        const sub = (typeof item === 'string') ? '' : (item.subtitle || '');
        captions.push({ title: t, subtitle: sub });
      });

      const slides = Array.from(slidesWrap.children);
      let idx = 0;
      // autoplay / progress handling
      const AUTOPLAY_MS = 10000;
      // start caption animation after slide transition to sync motion
      const CAPTION_START_DELAY = 300; // ms
      let tickerId = null;
      let progressStart = 0;
      let progressElapsed = 0;

      const overlayTitle = null; // not used; captions handled by captionEl

      // update slide visuals (without caption animation)
      const update = ()=>{
        slides.forEach((s,i)=> s.classList.toggle('active', i===idx));
        if(counter) counter.textContent = `${idx+1} / ${slides.length}`;
      };

      // animate caption + feather using keyframes; if user prefers reduced motion, use JS tween fallback
      let _captionFallbackTimer = null;
      let _captionRaf = null;
      const animateCaption = (newIdx)=>{
        const info = captions[newIdx] || { title:'', subtitle:'' };
        if(_captionFallbackTimer){ clearTimeout(_captionFallbackTimer); _captionFallbackTimer = null; }
        if(_captionRaf){ cancelAnimationFrame(_captionRaf); _captionRaf = null; }

        captionEl.classList.remove('show','animate-in');
        feather.classList.remove('show','animate-in');

        setTimeout(()=>{
          if(!(info.title || info.subtitle)){
            captionTitle.textContent = '';
            captionSub.textContent = '';
            return;
          }
          captionTitle.textContent = info.title;
          captionSub.textContent = info.subtitle;
          void captionEl.offsetWidth;

          const prefersReduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
          const useJsAnim = FORCE_JS_CAPTION_ANIM || prefersReduced;
          const DURATION = 900; // ms
          const SUB_DELAY = 140; // ms between title and subtitle
          if(useJsAnim){
            // JS tween: animate title first, then subtitle after SUB_DELAY
            captionEl.style.transition = 'none';
            feather.style.transition = 'none';
            captionTitle.style.opacity = '0';
            captionTitle.style.transform = 'translateX(28px)';
            captionSub.style.opacity = '0';
            captionSub.style.transform = 'translateX(28px)';
            feather.style.opacity = '0';
            const start = performance.now();
            const step = ()=>{
              const now = performance.now();
              const t = now - start;
              const pTitle = Math.min(1, Math.max(0, t / DURATION));
              const pSub = Math.min(1, Math.max(0, (t - SUB_DELAY) / DURATION));
              const easeTitle = 1 - Math.pow(1 - pTitle, 3);
              const easeSub = 1 - Math.pow(1 - pSub, 3);
              captionTitle.style.opacity = String(easeTitle);
              captionTitle.style.transform = `translateX(${28 * (1 - easeTitle)}px)`;
              captionSub.style.opacity = String(easeSub);
              captionSub.style.transform = `translateX(${28 * (1 - easeSub)}px)`;
              feather.style.opacity = String(Math.max(easeTitle, easeSub));
              if((pTitle < 1) || (pSub < 1)){
                _captionRaf = requestAnimationFrame(step);
              } else {
                _captionRaf = null;
                captionEl.classList.add('show');
                feather.classList.add('show');
                captionTitle.style.transition = '';
                captionSub.style.transition = '';
                feather.style.transition = '';
              }
            };
            _captionRaf = requestAnimationFrame(step);
            return;
          }

          // Normal path: use CSS keyframe animation
          const prevCapTrans = captionEl.style.transition || '';
          const prevFeatherTrans = feather.style.transition || '';
          captionEl.style.transition = 'none';
          feather.style.transition = 'none';

          const onAnimStart = (e)=>{ console.debug('caption animationstart', e.type, e.animationName); };
          const onAnimEnd = (e)=>{ console.debug('caption animationend', e.type, e.animationName); };
          captionEl.addEventListener('animationstart', onAnimStart);
          captionEl.addEventListener('animationend', onAnimEnd);
          feather.addEventListener('animationstart', onAnimStart);
          feather.addEventListener('animationend', onAnimEnd);

          captionEl.classList.add('animate-in');
          feather.classList.add('animate-in');

          const onCaptionEnd = ()=>{
            captionEl.removeEventListener('animationstart', onAnimStart);
            captionEl.removeEventListener('animationend', onAnimEnd);
            captionEl.classList.remove('animate-in');
            captionEl.classList.add('show');
            captionEl.style.transition = prevCapTrans;
            captionEl.removeEventListener('animationend', onCaptionEnd);
          };
          const onFeatherEnd = ()=>{
            feather.removeEventListener('animationstart', onAnimStart);
            feather.removeEventListener('animationend', onAnimEnd);
            feather.classList.remove('animate-in');
            feather.classList.add('show');
            feather.style.transition = prevFeatherTrans;
            feather.removeEventListener('animationend', onFeatherEnd);
          };
          captionEl.addEventListener('animationend', onCaptionEnd);
          feather.addEventListener('animationend', onFeatherEnd);

          _captionFallbackTimer = setTimeout(()=>{
            if(captionEl.classList.contains('animate-in')){
              captionEl.classList.remove('animate-in');
              captionEl.classList.add('show');
              captionEl.style.transition = prevCapTrans;
            }
            if(feather.classList.contains('animate-in')){
              feather.classList.remove('animate-in');
              feather.classList.add('show');
              feather.style.transition = prevFeatherTrans;
            }
            _captionFallbackTimer = null;
          }, DURATION + 200);
        }, 60);
      };

      let _captionTimer = null;
      function hideCaptionImmediate(){
        if(_captionTimer){ clearTimeout(_captionTimer); _captionTimer = null; }
        if(_captionRaf){ cancelAnimationFrame(_captionRaf); _captionRaf = null; }
        if(_captionFallbackTimer){ clearTimeout(_captionFallbackTimer); _captionFallbackTimer = null; }
        captionEl.classList.remove('animate-in','show');
        feather.classList.remove('animate-in','show');
        // reset per-element inline styles so they're invisible until animated
        try{
          captionTitle.style.opacity = '0';
          captionTitle.style.transform = 'translateX(28px)';
          captionSub.style.opacity = '0';
          captionSub.style.transform = 'translateX(28px)';
          feather.style.opacity = '0';
        }catch(e){}
      }

      const goto = (i)=>{ idx = (i + slides.length) % slides.length; update(); hideCaptionImmediate(); _captionTimer = setTimeout(()=>{ animateCaption(idx); _captionTimer = null; }, CAPTION_START_DELAY); };
      const prevFn = ()=>{ goto(idx-1); restartAutoplay(); };
      const nextFn = ()=>{ goto(idx+1); restartAutoplay(); };

      // use requestAnimationFrame for smooth per-frame updates
      function rafLoop(){
        const now = Date.now();
        const elapsed = progressElapsed + (progressStart ? (now - progressStart) : 0);
        if(elapsed >= AUTOPLAY_MS){
          const steps = Math.floor(elapsed / AUTOPLAY_MS);
          goto(idx + steps);
          const rem = elapsed - (steps * AUTOPLAY_MS);
          progressElapsed = rem;
          // restart base time after advancing
          progressStart = Date.now();
        }
        const pct = Math.min(100, (elapsed / AUTOPLAY_MS) * 100);
        // direct width updates per-frame (no long transitions) for smoothness
        progressFill.style.transition = 'none';
        progressFill.style.width = pct + '%';
        tickerId = requestAnimationFrame(rafLoop);
      }

      function startAutoplay(){ stopTicker(); progressStart = Date.now(); progressElapsed = 0; update(); progressFill.style.transition = 'none'; tickerId = requestAnimationFrame(rafLoop); }

      function stopTicker(){ if(tickerId){ cancelAnimationFrame(tickerId); tickerId = null; } }

      function pauseAutoplay(){ if(!tickerId) return; stopTicker(); progressElapsed += (Date.now() - progressStart); progressStart = 0; }

      function resumeAutoplay(){ if(tickerId) return; progressStart = Date.now(); tickerId = requestAnimationFrame(rafLoop); }

      function restartAutoplay(){ progressElapsed = 0; progressStart = Date.now(); stopTicker(); tickerId = requestAnimationFrame(rafLoop); }

      if(prev) prev.addEventListener('click', prevFn);
      if(next) next.addEventListener('click', nextFn);
      slider.addEventListener('mouseenter', ()=>{ pauseAutoplay(); });
      slider.addEventListener('mouseleave', ()=>{ resumeAutoplay(); });

      // init
      update();
      // ensure caption is hidden at initial state, then animate after delay
      hideCaptionImmediate();
      _captionTimer = setTimeout(()=>{ animateCaption(idx); _captionTimer = null; }, CAPTION_START_DELAY);
      startAutoplay();
    })();

    // copy button behavior
    document.querySelectorAll('.copy-btn').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        const val = btn.getAttribute('data-copy') || '';
        try{
          await navigator.clipboard.writeText(val);
          btn.classList.add('copied');
          const prev = btn.textContent;
          btn.textContent = 'Copied!';
          setTimeout(()=>{ btn.classList.remove('copied'); btn.textContent = prev; }, 1500);
        }catch(e){
          console.error('copy failed', e);
        }
      })
    });
    // set footer year
    const yearEl = document.getElementById('copy-year'); if(yearEl) yearEl.textContent = new Date().getFullYear();
    
    /* Page-top background layer: create element and set height to reach the "채널별 영상 리스트" title.
       This places a full-bleed band behind everything up to that title without affecting cards or header. */
    function ensurePageTopBg(){
      if(document.getElementById('page-top-bg')) return;
      const bg = document.createElement('div');
      bg.id = 'page-top-bg';
      document.body.insertBefore(bg, document.body.firstChild);
    }

    function updatePageTopBg(){
      const title = document.querySelector('#videos-section .channels-title');
      if(!title){ document.documentElement.style.setProperty('--page-top-bg-height', '0px'); return; }
      // compute title's distance from the viewport top so the fixed bg height
      // matches the title's current position while scrolling
      const rect = title.getBoundingClientRect();
      const topViewport = rect.top; // px from viewport top
      const height = Math.max(0, Math.round(topViewport));
      document.documentElement.style.setProperty('--page-top-bg-height', height + 'px');
    }

    // initialize and keep updated on load/resize
    window.addEventListener('DOMContentLoaded', ()=>{ ensurePageTopBg(); updatePageTopBg(); });
    window.addEventListener('load', ()=>{ ensurePageTopBg(); updatePageTopBg(); });
    window.addEventListener('resize', ()=>{ requestAnimationFrame(updatePageTopBg); });
    // update on scroll with rAF to keep the fixed background bottom aligned with the title's viewport position
    (function(){
      let ticking = false;
      window.addEventListener('scroll', ()=>{
        if(ticking) return;
        ticking = true;
        requestAnimationFrame(()=>{ updatePageTopBg(); ticking = false; });
      }, { passive: true });
    })();
  </script>
